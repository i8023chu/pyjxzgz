        ]
    };

    let currentCourse = "driver";
    let currentFilter = "";

    function buildTree(data) {
        const tree = new Map();
        data.forEach(item => {
            if (!tree.has(item.module)) tree.set(item.module, new Map());
            const moduleMap = tree.get(item.module);
            if (!moduleMap.has(item.chapter)) moduleMap.set(item.chapter, []);
            moduleMap.get(item.chapter).push(item);
        });
        return tree;
    }

    function playVideo(v) {
        if (!v || !v.url) return;
        const videoPlayer = document.getElementById('mainVideo');
        videoPlayer.src = v.url;
        videoPlayer.load();
        document.getElementById('currentTitle').innerText = v.title;
        document.getElementById('currentChapter').innerText = v.module + " · " + v.chapter;
        document.querySelectorAll('.chapter-item').forEach(el => el.classList.remove('active'));
        document.querySelectorAll(`.chapter-item[data-url="${v.url}"]`).forEach(el => el.classList.add('active'));
    }

    function escapeHtml(s) {
        return s.replace(/[&<>]/g, function(m) {
            return m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;';
        });
    }

    function renderCatalog() {
        let data = coursesData[currentCourse];
        if (!data) data = [];
        document.getElementById('videoCount').innerText = data.length + '个视频';
        const tree = buildTree(data);
        let html = '';
        let idx = 0;
        for (let [mod, chMap] of tree.entries()) {
            let chHtml = '';
            let modVis = 0;
            let mid = 'mod_' + idx++;
            for (let [chap, items] of chMap.entries()) {
                let itemHtml = '';
                let vis = 0;
                for (let it of items) {
                    if (currentFilter === '' || it.title.toLowerCase().includes(currentFilter) || it.chapter.toLowerCase().includes(currentFilter) || it.module.toLowerCase().includes(currentFilter)) {
                        vis++;
                        itemHtml += `<div class="chapter-item" data-url="${it.url}"><span class="video-badge">▶</span><span class="video-title">${escapeHtml(it.title)}</span></div>`;
                    }
                }
                if (vis > 0) {
                    chHtml += `<div><div class="chapter-item" style="font-weight:600;background:#fafcff;cursor:default;padding-left:1.2rem;">📖 ${escapeHtml(chap)} (${vis})</div><div style="padding-left:0.5rem;">${itemHtml}</div></div>`;
                    modVis += vis;
                }
            }
            if (modVis > 0) {
                html += `<div class="module-group"><div class="module-title collapsed" data-module-target="${mid}"><span>📁 ${escapeHtml(mod)} (${modVis})</span><span class="arrow">▼</span></div><div class="chapter-list collapsed" id="${mid}">${chHtml}</div></div>`;
            }
        }
        if (html === '') html = '<div style="padding:2rem;text-align:center;">🔍 未找到相关课程</div>';
        document.getElementById('listContainer').innerHTML = html;

        document.querySelectorAll('.chapter-item[data-url]').forEach(el => {
            el.addEventListener('click', () => {
                let url = el.getAttribute('data-url');
                let found = data.find(v => v.url === url);
                if (found) playVideo(found);
            });
        });

        document.querySelectorAll('.module-title').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                let tid = btn.getAttribute('data-module-target');
                let tar = document.getElementById(tid);
                if (tar) {
                    tar.classList.toggle('collapsed');
                    btn.classList.toggle('collapsed');
                }
            });
        });
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
        currentFilter = e.target.value.trim().toLowerCase();
        renderCatalog();
    });

    document.getElementById('expandAllBtn').addEventListener('click', () => {
        document.querySelectorAll('.chapter-list').forEach(el => el.classList.remove('collapsed'));
        document.querySelectorAll('.module-title').forEach(el => el.classList.remove('collapsed'));
    });

    document.getElementById('collapseAllBtn').addEventListener('click', () => {
        document.querySelectorAll('.chapter-list').forEach(el => el.classList.add('collapsed'));
        document.querySelectorAll('.module-title').forEach(el => el.classList.add('collapsed'));
    });

    document.querySelectorAll('.course-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.course-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentCourse = tab.dataset.course;
            currentFilter = '';
            document.getElementById('searchInput').value = '';
            renderCatalog();
            if (coursesData[currentCourse] && coursesData[currentCourse][0]) playVideo(coursesData[currentCourse][0]);
        });
    });

    renderCatalog();
    if (coursesData.driver[0]) playVideo(coursesData.driver[0]);
    document.querySelector('.course-tab[data-course="driver"]').classList.add('active');
</script>
